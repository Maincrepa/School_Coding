<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Endevina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        .contingut-img {
            max-width: 400px;
            max-height: 400px;
            object-fit: cover;
            border-radius: 12px;
            transition: filter 0.5s;
        }
        .blur-0 { filter: blur(20px); }
        .blur-1 { filter: blur(12px); }
        .blur-2 { filter: blur(6px); }
        .blur-3 { filter: blur(0); }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <div class="card shadow-lg">

                    <!-- Capçalera amb puntuació -->
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h2 class="m-0">Endevina!</h2>
                        <span class="badge bg-warning text-dark fs-5">
                            Puntuació: <span th:text="${puntuacio}">0</span>
                        </span>
                    </div>

                    <div class="card-body text-center">

                        <!-- *** POLIMORFISME A LA VISTA ***
                             Cada mode mostra un element diferent.
                             th:switch avalua només el cas que coincideix. -->
                        <div th:switch="${mode}" class="mb-4">

                            <!-- Animals: imatge que es desdifumina -->
                            <img th:case="'animal'"
                                 th:src="${urlPista}"
                                 th:classappend="'blur-' + ${intents}"
                                 class="contingut-img"
                                 alt="Animal misterios">

                            <!-- Cançons: reproductor d'àudio -->
                            <div th:case="'canco'">
                                <audio th:src="${urlPista}" controls class="w-100 mt-2"></audio>
                            </div>

                            <!-- Pel·lícules: fotograma que es desdifumina -->
                            <img th:case="'pelicula'"
                                 th:src="${urlPista}"
                                 th:classappend="'blur-' + ${intents}"
                                 class="contingut-img"
                                 alt="Escena misteriosa">
                        </div>

                        <!-- Pistes (apareixen progressivament) -->
                        <div class="mb-4">
                            <h5 class="text-muted">Pistes:</h5>
                            <ul class="list-group">
                                <li class="list-group-item"
                                    th:each="pista : ${pistesVisibles}"
                                    th:text="${pista}">Pista exemple</li>
                            </ul>
                        </div>

                        <!-- Últim error -->
                        <div th:if="${ultimError != null}" class="alert alert-danger">
                            Incorrecte: <strong th:text="${ultimError}">?</strong>
                        </div>

                        <!-- Formulari per endevinar -->
                        <form method="post" th:action="@{/endevinar}">
                            <div class="input-group input-group-lg">
                                <input type="text"
                                       name="resposta"
                                       class="form-control"
                                       placeholder="Quina és la resposta?"
                                       autofocus
                                       required>
                                <button type="submit" class="btn btn-primary">Endevinar</button>
                            </div>
                        </form>

                        <!-- Comptador d'intents -->
                        <p class="mt-3 text-muted">
                            Intents fallits: <strong th:text="${intents}">0</strong>
                        </p>

                        <div class="mt-2">
                            <a th:href="@{/seguent}" class="btn btn-sm btn-outline-secondary me-2">
                                Saltar aquest
                            </a>
                            <a th:href="@{/}" class="btn btn-sm btn-outline-dark">
                                Canviar de mode
                            </a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
